<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chartreuse Views</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Figtree:wght@300;400;500;600&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cv: #7FFF00;
      --cv-dark: #7FFF00;
      --cv-pale: rgba(127,255,0,0.08);
      --cv-glow: rgba(127,255,0,0.3);
      --bg: #141a10;
      --bg-mid: #1a2214;
      --bg-soft: #222e1c;
      --ink: #f0ede4;
      --ink-mid: #c8c4b8;
      --ink-soft: #8a8880;
      --ink-ghost: rgba(240,237,228,0.25);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Figtree', sans-serif;
      overflow-x: hidden;
      cursor: default;
    }

    /* subtle paper grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.8;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(20,26,16,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cv-dark);
      text-decoration: none;
    }

    .nav-dropdown { position: relative; }

    .nav-dropdown-btn {
      background: none;
      border: none;
      font-family: 'Figtree', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
      padding: 0;
    }

    .nav-dropdown-btn:hover { color: var(--cv-dark); }

    .nav-dropdown-btn::after {
      content: '▾';
      font-size: 0.65rem;
      transition: transform 0.2s;
    }

    .nav-dropdown:hover .nav-dropdown-btn::after { transform: rotate(180deg); }
    .nav-dropdown.open .nav-dropdown-btn::after { transform: rotate(180deg); }

    .nav-dropdown-menu {
      position: absolute;
      top: calc(100% + 1rem);
      right: 0;
      background: rgba(20,26,16,0.99);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      min-width: 200px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: opacity 0.2s, transform 0.2s;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .nav-dropdown.open .nav-dropdown-menu {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .nav-dropdown-item {
      display: block;
      padding: 0.9rem 1.2rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-dropdown-item:last-child { border-bottom: none; }
    .nav-dropdown-item:hover { background: var(--cv-pale); color: var(--cv-dark); }
    .nav-dropdown-item.active { color: var(--cv-dark); }

    .item-sub {
      display: block;
      font-size: 0.6rem;
      opacity: 0.5;
      margin-top: 0.2rem;
      letter-spacing: 0.08em;
      text-transform: none;
      font-weight: 300;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 8rem 2rem 6rem;
      text-align: center;
      overflow: hidden;
      background: var(--bg);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 30%, rgba(200,230,58,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 15% 60%, rgba(200,230,58,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 30% 40% at 85% 70%, rgba(200,230,58,0.05) 0%, transparent 60%);
    }

    .rings {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(107,133,0,0.12);
      animation: ringExpand 8s ease-out infinite;
    }
    .ring:nth-child(1) { width: 300px; height: 300px; animation-delay: 0s; }
    .ring:nth-child(2) { width: 500px; height: 500px; animation-delay: 1.5s; }
    .ring:nth-child(3) { width: 700px; height: 700px; animation-delay: 3s; }
    .ring:nth-child(4) { width: 900px; height: 900px; animation-delay: 4.5s; }

    @keyframes ringExpand {
      0% { opacity: 0; transform: scale(0.8); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.1); }
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4.5rem, 14vw, 11rem);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--ink);
      animation: fadeUp 1s 0.1s ease both;
    }

    .hero-title .cv-word {
      color: var(--cv-dark);
      font-style: italic;
      display: block;
    }

    .hero-sub {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-top: 2rem;
      animation: fadeUp 1s 0.2s ease both;
    }

    .hero-scroll {
      position: absolute;
      bottom: 3rem;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      animation: fadeUp 1s 0.8s ease both;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .scroll-text {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-ghost);
    }

    .scroll-bar {
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, var(--cv-dark), transparent);
      animation: scrollDrop 2s ease-in-out infinite;
    }

    @keyframes scrollDrop {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.5); opacity: 0.4; }
    }

    /* ── MUSIC PLAYER ── kept dark for contrast ── */
    .player-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(0,0,0,0.98);
      backdrop-filter: blur(20px);
      border-top: 2px solid var(--cv);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .player-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cv);
      animation: playerPulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes playerPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .player-info { flex: 1; }

    .player-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,242,232,0.5);
    }

    .player-song {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: #f5f2e8;
      margin-top: 0.1rem;
    }

    .player-btn {
      background: none;
      border: 1px solid rgba(200,230,58,0.4);
      color: var(--cv);
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Figtree', sans-serif;
    }

    .player-btn:hover { background: rgba(200,230,58,0.1); border-color: var(--cv); }

    /* ── STATS ── */
    .stats {
      padding: 6rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      border: 1px solid var(--bg-soft);
      border-radius: 4px;
      overflow: hidden;
    }

    .stat {
      padding: 2.5rem 2rem;
      background: var(--bg-mid);
      text-align: center;
      border-right: 1px solid var(--bg-soft);
    }

    .stat:last-child { border-right: none; }

    .stat-num {
      font-family: 'Figtree', sans-serif;
      font-size: 3rem;
      font-weight: 300;
      color: var(--cv-dark);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 400;
    }

    /* ── VOLUMES ── */
    .volumes {
      padding: 8rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--cv-dark);
      margin-bottom: 3rem;
      font-weight: 300;
    }

    .volumes-grid {
      display: flex;
      justify-content: center;
    }

    .volume-card {
      position: relative;
      border: 1px solid var(--bg-soft);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
      text-decoration: none;
      display: block;
      width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }

    .volume-card:hover {
      border-color: var(--cv-dark);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .volume-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      filter: saturate(0.8) brightness(0.65);
      transition: filter 0.4s;
    }

    .volume-card:hover .volume-img {
      filter: saturate(1) brightness(0.8);
    }

    .volume-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,6,0.95) 0%, rgba(10,10,6,0.3) 60%, transparent 100%);
    }

    .volume-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2rem;
    }

    .volume-year {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: #f5f2e8;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .volume-dates {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: rgba(245,242,232,0.55);
      text-transform: uppercase;
    }

    .volume-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cv);
      font-weight: 500;
    }

    .volume-cta::after { content: '→'; transition: transform 0.2s; }
    .volume-card:hover .volume-cta::after { transform: translateX(4px); }

    /* ── ABOUT ── */
    .about {
      padding: 6rem 3rem;
      border-top: 1px solid var(--bg-soft);
    }

    .about-inner {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    .about-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.4;
      color: var(--ink);
    }

    .about-quote span { color: var(--cv-dark); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--bg-soft);
      padding: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cv-dark);
    }

    .footer-copy {
      font-size: 0.7rem;
      color: var(--ink-ghost);
      letter-spacing: 0.08em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .volumes { padding: 5rem 1.5rem; }
      .about { padding: 4rem 1.5rem; }
      .stats { padding: 4rem 1.5rem; }
      footer { padding: 2rem 1.5rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .volume-card { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">Chartreuse Views</a>
    <div class="nav-dropdown">
      <button class="nav-dropdown-btn">Volumes</button>
      <div class="nav-dropdown-menu">
        <a href="year-one.html" class="nav-dropdown-item active">
          Year One
          <span class="item-sub">2025 — 2026</span>
        </a>
        <!-- Add new years here each March 29th -->
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="rings">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <h1 class="hero-title">
      Chartreuse
      <span class="cv-word">Views</span>
    </h1>
    <p class="hero-sub">Est. 2025</p>
    <div class="hero-scroll">
      <div class="scroll-bar"></div>
      <span class="scroll-text">Scroll</span>
    </div>
  </section>

  <!-- VOLUMES -->
  <section class="volumes" id="volumes">
    <p class="section-eyebrow reveal">Volumes</p>
    <div class="volumes-grid">
      <a href="year-one.html" class="volume-card reveal">
        <img class="volume-img" src="https://pub-8880c245e94e43a9a8203f5fd57e8ece.r2.dev/IMG_7589.JPG" alt="Year One" />
        <div class="volume-overlay"></div>
        <div class="volume-content">
          <div class="volume-year">Year One</div>
          <div class="volume-dates">2025 — 2026</div>
          <div class="volume-cta">Open this chapter</div>
        </div>
      </a>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about">
    <div class="about-inner">
      <p class="about-quote reveal">
        An interactive compendium of our <span>views</span> together throughout each year.
      </p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-copy">Mitch & Becka · chartreuseviews.com</div>
  </footer>

  <script>
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 80);
        }
      });
    }, { threshold: 0.1 });
    reveals.forEach(r => observer.observe(r));

    // Hide scroll indicator once user scrolls past hero
    const heroScroll = document.querySelector('.hero-scroll');
    const heroHeight = document.querySelector('.hero').offsetHeight;
    window.addEventListener('scroll', () => {
      if (window.scrollY > heroHeight * 0.5) {
        heroScroll.style.opacity = '0';
      } else {
        heroScroll.style.opacity = '1';
      }
    });

    // Click-based dropdown
    const dropdown = document.querySelector('.nav-dropdown');
    const dropBtn = document.querySelector('.nav-dropdown-btn');
    dropBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });
    document.addEventListener('click', () => dropdown.classList.remove('open'));
  </script>

</body>
</html>
